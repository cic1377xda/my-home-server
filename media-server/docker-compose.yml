# ==============================================================================
# ULTIMATE HOME MEDIA SERVER ARCHITECTURE (THE *ARR STACK)
# ==============================================================================
# Description:
#   A fully automated media server stack capable of searching, downloading, 
#   organizing, and streaming media. Features hardware acceleration (Intel QSV) 
#   and optimized atomic moves (hardlinks) to prevent storage duplication.
#
# Directory Architecture & Volume Mapping:
#   ${CONFIG_DIR}/ : Stores all application configurations, API keys, and 
#                    SQLite databases. (Ignored in Git for security).
#   ${DATA_DIR}/   : The root storage directory.
#                    ├── /torrents : Raw downloads managed by qBittorrent
#                    └── /media    : Organized libraries managed by Radarr/Sonarr
#
# Hardlink Strategy:
#   By mapping the entire ${DATA_DIR} to /data inside the containers, the *arr 
#   apps can instantly hardlink files from /data/torrents to /data/media 
#   without copying, saving massive amounts of disk space.
# ==============================================================================

services:
  # 1. DOWNLOADER
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Kuala_Lumpur}
      - WEBUI_PORT=8080
    volumes:
      - ${CONFIG_DIR}/qbittorrent:/config
      - ${DATA_DIR}:/data
    ports:
      - "8085:8080"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped
    networks:
      - pwn20wnd-network
      - default

  # 2. INDEXER MANAGER
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Kuala_Lumpur}
    volumes:
      - ${CONFIG_DIR}/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped
    networks:
      - pwn20wnd-network
      - default

  # 3. MOVIE MANAGER
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Kuala_Lumpur}
    volumes:
      - ${CONFIG_DIR}/radarr:/config
      - ${DATA_DIR}:/data
    ports:
      - "7878:7878"
    depends_on:
      - qbittorrent
      - prowlarr
    restart: unless-stopped
    networks:
      - pwn20wnd-network
      - default

  # 4. TV SERIES MANAGER
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Kuala_Lumpur}
    volumes:
      - ${CONFIG_DIR}/sonarr:/config
      - ${DATA_DIR}:/data
    ports:
      - "8989:8989"
    depends_on:
      - qbittorrent
      - prowlarr
    restart: unless-stopped
    networks:
      - pwn20wnd-network
      - default

  # 5. MUSIC MANAGER
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Kuala_Lumpur}
    volumes:
      - ${CONFIG_DIR}/lidarr:/config
      - ${DATA_DIR}:/data
    ports:
      - "8686:8686"
    depends_on:
      - qbittorrent
      - prowlarr
    restart: unless-stopped
    networks:
      - pwn20wnd-network
      - default

  # 6. SUBTITLE MANAGER
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Kuala_Lumpur}
    volumes:
      - ${CONFIG_DIR}/bazarr:/config
      - ${DATA_DIR}:/data
    ports:
      - "6767:6767"
    restart: unless-stopped
    networks:
      - pwn20wnd-network
      - default

  # 7. MEDIA PLAYER (With Hardware Transcoding)
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Kuala_Lumpur}
    volumes:
      - ${CONFIG_DIR}/jellyfin:/config
      # Mounts only the media directory for added security, isolating it from torrents
      - ${DATA_DIR}/media:/data/media 
    ports:
      - "8096:8096"
    devices:
      # Expose Intel Quick Sync (QSV) for hardware-accelerated transcoding
      - /dev/dri:/dev/dri
    restart: unless-stopped
    networks:
      - pwn20wnd-network
      - default

# ==============================================================================
# NETWORK DEFINITIONS
# ==============================================================================
networks:
  pwn20wnd-network:
    external: true
