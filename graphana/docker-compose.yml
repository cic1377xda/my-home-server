# ==============================================================================
# SERVER MONITORING & TELEMETRY STACK - DOCKER COMPOSE CONFIGURATION
# ==============================================================================
# Description:
#   A comprehensive server health monitoring stack. It utilizes Node Exporter 
#   to scrape host hardware metrics, Prometheus as the Time-Series Database 
#   (TSDB), and Grafana for powerful real-time visualization. 
#
# IoT Extensibility:
#   This stack is also designed to be highly extensible. It includes an isolated 
#   MariaDB and PHP webserver environment, allowing it to ingest and store 
#   custom telemetry data from external IoT devices (e.g., weather stations).
#
# Directory Architecture & Volume Mapping:
#   ${DATA_DIR}/ : Root storage for persistent data (Ignored in version control).
#                  ├── /grafana    : Dashboard configurations and user data.
#                  ├── /prometheus : Time-series database for hardware metrics.
#                  └── /mariadb_iot: Relational database for IoT payloads.
#
# Security Notice:
#   Database credentials and Grafana admin passwords are securely injected via 
#   the .env file. The custom PHP backend source code is ignored via .gitignore.
# ==============================================================================

services:
  # 1. GRAFANA (Data Visualization & Dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - '3010:3000'
    volumes:
      - ${DATA_DIR}/grafana:/var/lib/grafana
    env_file:
      - .env
    environment:
      - TZ=${TZ:-Asia/Kuala_Lumpur}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    user: "472:472"
    depends_on:
      - prometheus
      - mariadb
    networks:
      - pwn20wnd-network
      - default

  # 2. PROMETHEUS (Time-Series Metrics Database)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${DATA_DIR}/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - pwn20wnd-network
      - default

  # 3. NODE EXPORTER (Host System Hardware Monitor)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - '9100:9100'
    volumes:
      # Read-only mounts for hardware/OS metric collection
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - pwn20wnd-network
      - default

  # 4. MARIADB (Relational Database for IoT Extensibility)
  mariadb:
    image: mariadb:latest
    container_name: mariadb_iot
    restart: unless-stopped
    ports:
      - '3307:3306'
    env_file:
      - .env
    environment:
      - TZ=${TZ:-Asia/Kuala_Lumpur}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ${DATA_DIR}/mariadb_iot:/var/lib/mysql
    networks:
      - pwn20wnd-network
      - default

  # 5. PHPMYADMIN (Database GUI Management)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin_iot
    restart: unless-stopped
    ports:
      - '8099:80'
    environment:
      - TZ=${TZ:-Asia/Kuala_Lumpur}
      - PMA_HOST=mariadb
      - PMA_PORT=3306
    depends_on:
      - mariadb
    networks:
      - pwn20wnd-network
      - default

  # 6. CUSTOM PHP BACKEND (IoT Data Ingestion API)
  webserver:
    build: .
    container_name: php_backend
    restart: unless-stopped
    ports:
      - '8090:80'
    volumes:
      - ./www:/var/www/html
    environment:
      - TZ=${TZ:-Asia/Kuala_Lumpur}
    depends_on:
      - mariadb
    networks:
      - pwn20wnd-network
      - default

# ==============================================================================
# NETWORK DEFINITIONS
# ==============================================================================
networks:
  pwn20wnd-network:
    external: true
